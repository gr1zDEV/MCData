name: Sync category markdown

on:
  push:
    paths:
      - 'data/items.json'
      - 'data/items.md'
      - 'tools/sync_categories.py'
      - '.github/workflows/sync-categories.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-categories-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate markdown lists
        run: python tools/sync_categories.py

      - name: Commit changes if needed
        run: |
          if git diff --quiet; then
            echo "No category changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/items.md data/categories
          git commit -m "chore: sync categorized markdown lists"
          git push
