name: Update vanilla Minecraft item IDs

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-minecraft-items
  cancel-in-progress: false

jobs:
  update-items:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Extract vanilla item IDs
        run: python tools/extract_items.py

      - name: Commit and push changes
        run: |
          if git diff --quiet -- data/items.json data/items.txt data/version.json; then
            echo "No changes detected; skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/items.json data/items.txt data/version.json
          git commit -m "chore(data): update vanilla Minecraft item IDs"
          git push
